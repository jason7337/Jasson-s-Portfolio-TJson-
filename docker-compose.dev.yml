version: '3.8'

services:
  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
      - "5001:5001"  # HMR port
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app/client
      - ./server.js:/app/server.js
      - ./start-production.js:/app/start-production.js
      - /app/node_modules
    restart: unless-stopped
    networks:
      - portfolio-network
    command: npm run dev

networks:
  portfolio-network:
    driver: bridge